<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4601178762858644"
     crossorigin="anonymous"></script>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mango-svg122.github.io/">

    <meta property="og:description" content="Stay updated with the latest technology trends, AI advancements, and industry insights. Explore expert articles on emerging tech topics.">
    <meta property="og:image" content="https://mango-svg122.github.io/tech-hotspot-preview.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mango-svg122.github.io/">
    <meta property="twitter:title" content="Tech Hotspot Aggregation - Latest Technology Trends">
    <meta property="twitter:description" content="Stay updated with the latest technology trends, AI advancements, and industry insights. Explore expert articles on emerging tech topics.">
    <meta property="twitter:image" content="https://mango-svg122.github.io/tech-hotspot-preview.jpg">
    
    <title>Tech Hotspot Aggregation</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tech Hotspot Aggregation",
      "url": "https://mango-svg122.github.io/",
      "description": "Stay updated with the latest technology trends, AI advancements, and industry insights. Explore expert articles on emerging tech topics."
    }
    </script>
</head>
<body>
    <script>
        // 只在桌面设备上加载粒子网络特效
        if (window.innerWidth > 768) {
            document.write('<div class="particle-network"></div>');
        }
    </script>
    <header class="glassmorphism">
        <h1>Tech Hotspot Aggregation</h1>
<nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="privacy.html">Privacy</a></li>
        </ul>
    </nav>
    </header>
    <main style="width: 100%; max-width: 1600px; margin: 0 auto;">
        <section id="articles" class="card">
            <div class="card-header">
                <h2>Latest Articles</h2>
            </div>
            <div class="card-content">
                <ul id="article-list">
                    <!-- Articles loaded dynamically from articles.json -->
                </ul>
            </div>
        </section>
    </main>
    <script>
        // 只在桌面设备上加载粒子网络特效
        if (window.innerWidth > 768) {
            document.write('<div class="particle-network"></div>');
        }
    </script>
    <script>
        // Auto-load articles from JSON
        fetch('articles.json')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('article-list');
                data.articles.sort((a, b) => new Date(b.date) - new Date(a.date));
                data.articles.forEach(article => {
                    const li = document.createElement('li');
                    li.className = 'glassmorphism';
                    li.innerHTML = `
                        <a href="${article.id}.html">
                            <h3>${article.title}</h3>
                            <p>${article.description}</p>
                        </a>
                    `;
                    list.appendChild(li);
                });
            })
            .catch(err => {
                console.error('Failed to load articles:', err);
            });
    </script>
    <script src="script.js"></script>
</body>
</html>
